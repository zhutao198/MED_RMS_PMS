name: Med-RMS CD Deploy (R129)
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cd-deploy.yml'
      - 'Code/backend/**'
      - 'Code/backend/ddl/**'
  workflow_dispatch:

jobs:
  build:
    name: Build + 占位提示
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Maven Build
        run: mvn -B -DskipTests -pl med-rms-web -am package

      - name: 占位提示（未配置 SSH 密钥）
        run: |
          echo "::warning::未配置 DEPLOY_SSH_KEY secret"
          echo "如需实际部署，请配置 GitHub Secrets："
          echo "  - DEPLOY_SSH_KEY / DEPLOY_HOST / DEPLOY_USER"