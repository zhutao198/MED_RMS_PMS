name: Med-RMS CD Deploy (R129)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cd-deploy.yml'
      - 'Code/backend/**'
      - 'Code/backend/ddl/**'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target env (staging / production)'
        required: true
        default: 'staging'

jobs:
  build:
    name: Build fat JAR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: |
          cd Code/backend
          mvn -B -DskipTests -pl med-rms-web -am package

      - name: 占位提示（未配置 SSH 密钥）
        if: "!secrets.DEPLOY_SSH_KEY"
        run: |
          echo "::warning::未配置 DEPLOY_SSH_KEY secret"
          echo "请在 GitHub Settings → Secrets 配置 SSH 部署密钥后此 workflow 才会实际部署。"
          echo "当前仅 build 验证，确保 R111-R134 修复可以编译。"

  deploy:
    name: SSH Deploy to ${{ github.event.inputs.target_env || 'staging' }}
    runs-on: ubuntu-latest
    needs: build
    if: "secrets.DEPLOY_SSH_KEY"
    timeout-minutes: 15
    environment:
      name: ${{ github.event.inputs.target_env || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: |
          cd Code/backend
          mvn -B -DskipTests -pl med-rms-web -am package

      - name: Upload JAR
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          scp Code/backend/med-rms-web/target/med-rms-web-1.0.0-SNAPSHOT.jar \
              $DEPLOY_USER@$DEPLOY_HOST:/opt/med-rms/

      - name: Remote Deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            pkill -f 'med-rms-web-.*\.jar' || true
            sleep 3
            cd /opt/med-rms
            nohup java -jar med-rms-web-1.0.0-SNAPSHOT.jar \
              --server.port=8080 \
              --spring.profiles.active=prod > app.log 2>&1 &
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8080/api/actuator/health > /dev/null; then
                echo "Ready in ${i}s"
                break
              fi
              sleep 1
            done
          EOF

      - name: Verify R120 fixes
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            TOKEN=$(curl -sf -X POST http://localhost:8080/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123"}' | jq -r '.data.token')
            echo "  /auth/me: $(curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/auth/me | jq -r '.data.username')"
            echo "  /requirements/stats total: $(curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/requirements/stats | jq -r '.data.total')"
          EOF