components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageParam:
      name: page
      in: query
      description: 页码（从1开始）
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeParam:
      name: size
      in: query
      description: 每页大小（默认20，最大100）
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      description: 排序（field,direction 如 createdAt,desc）
      schema:
        type: string
    UserIdParam:
      name: id
      in: path
      required: true
      description: 用户ID
      schema:
        type: string
        format: int64
    RequirementIdParam:
      name: id
      in: path
      required: true
      description: 需求ID
      schema:
        type: string
        format: int64
  responses:
    BadRequest:
      description: 请求参数校验失败
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证（Token缺失或过期）
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 无权限访问
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 资源冲突
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: 系统内部错误
      content:
        application/json:
          schema:
            allOf:
            - $ref: '#/components/schemas/ApiResponse'
            - type: object
              properties:
                data:
                  $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应状态码
          example: 200
        message:
          type: string
          description: 响应消息
          example: success
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳
    PageMeta:
      type: object
      required:
      - page
      - size
      - total
      - totalPages
      properties:
        page:
          type: integer
          description: 当前页码
          example: 1
        size:
          type: integer
          description: 每页大小
          example: 20
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 156
        totalPages:
          type: integer
          description: 总页数
          example: 8
    ErrorResponse:
      type: object
      required:
      - errorCode
      - errorMessage
      properties:
        errorCode:
          type: string
          description: 错误码
          example: SY0100
        errorMessage:
          type: string
          description: 错误消息
          example: 请求参数校验失败
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
          description: 字段级错误详情
    ImportResultVO:
      type: object
      required:
      - total
      - success
      - failed
      - errors
      properties:
        total:
          type: integer
          description: 总记录数
        success:
          type: integer
          description: 成功导入数
        failed:
          type: integer
          description: 失败数
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
                description: 行号
              message:
                type: string
                description: 错误消息
          description: 错误详情列表
    FileDownload:
      type: object
      properties:
        fileName:
          type: string
          description: 文件名
        content:
          type: string
          format: binary
          description: 文件内容
    ReqStatus:
      type: string
      enum:
      - Draft
      - PendingDecompose
      - Decomposed
      - Submitted
      - InReview
      - Approved
      - Rejected
      - PendingVerify
      - Implemented
      - Verified
      - Baseline
      - Changed
      - Closed
      - Retired
      description: 需求状态
    ReqType:
      type: string
      enum:
      - URS
      - PRS
      - SRS
      - DRS
      description: 需求类型（用户/产品/软件/设计）
    ReqPriority:
      type: string
      enum:
