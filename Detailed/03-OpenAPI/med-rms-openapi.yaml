# Med-RMS OpenAPI Specification v1.1
# 日期：2026-05-22
# 基线：概要设计 v1.2 + 系统架构 v1.1
# v1.29：自动注入 x-required-permission 标注（来自 PermissionMatrix 225 条规则）

openapi: 3.0.3
info:
  title: Med-RMS 医疗器械需求管理系统 API
  description: 'Med-RMS (Medical Device Requirement Management System) RESTful API 规范。

    涵盖需求管理、追溯管理、变更管理、合规管理、电子签名、风险管理、项目管理、报表仪表盘及系统管理模块。

    '
  version: 1.1.0
  contact:
    name: Med-RMS 开发团队
  license:
    name: Proprietary
servers:
- url: http://localhost:8080/api/v1
  description: 开发环境
tags:
- name: 认证与用户
  description: 用户认证、个人信息管理
- name: 用户管理
  description: 用户CRUD、角色权限管理
- name: 角色权限
  description: 角色与权限管理
- name: 组织架构
  description: 组织架构与OA同步
- name: 字典管理
  description: 数据字典类型与字典项管理
- name: 系统配置
  description: 系统配置项管理
- name: 需求管理
  description: 需求CRUD、状态变更、版本、评审、关联、导入
- name: 追溯管理
  description: 追溯链接、矩阵、覆盖率、缺口、导出
- name: 变更管理
  description: 变更请求、影响分析、审批、执行、验证
- name: 合规管理
  description: 审计日志、SOUP、安全分类、基线、法规映射、问题报告、IEC62304
- name: 电子签名
  description: 签名意图、执行签名、签名记录、验证、密码、OTP
- name: 风险管理
  description: 风险项、风险分析、控制措施、风险矩阵
- name: 项目管理
  description: 项目CRUD、成员管理、DCP门控
- name: 报表仪表盘
  description: 仪表盘、统计、导出、通知
security:
- BearerAuth: []
paths:
  /auth/login:
    post:
      operationId: login
      tags:
      - 认证与用户
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDTO'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/TokenVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/refresh:
    post:
      operationId: refreshToken
      tags:
      - 认证与用户
      summary: 刷新Token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshDTO'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/TokenVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/logout:
    post:
      operationId: logout
      tags:
      - 认证与用户
      summary: 用户登出
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/me:
    get:
      operationId: getCurrentUser
      tags:
      - 认证与用户
      summary: 获取当前用户信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:user:list
    put:
      operationId: updateProfile
      tags:
      - 认证与用户
      summary: 更新个人信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileDTO'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/me/password:
    put:
      operationId: changePassword
      tags:
      - 认证与用户
      summary: 修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeDTO'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users:
    get:
      operationId: getUserList
      tags:
      - 用户管理
      summary: 查询用户列表
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - $ref: '#/components/parameters/SortParam'
      - name: keyword
        in: query
        description: 搜索关键词（用户名/姓名/邮箱）
        schema:
          type: string
      - name: status
        in: query
        description: 用户状态
        schema:
          type: string
          enum:
          - Active
          - Disabled
      - name: roleId
        in: query
        description: 角色ID
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PageUserVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:user:list
    post:
      operationId: createUser
      tags:
      - 用户管理
      summary: 创建用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateDTO'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:user:list
  /users/{id}:
    put:
      operationId: updateUser
      tags:
      - 用户管理
      summary: 更新用户
      parameters:
      - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateDTO'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/UserVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:user:list
  /users/{id}/status:
    patch:
      operationId: toggleUserStatus
      tags:
      - 用户管理
      summary: 启用/禁用用户
      parameters:
      - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  description: 目标状态
                  enum:
                  - Active
                  - Disabled
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:user:list
  /roles:
    get:
      operationId: getRoleList
      tags:
      - 角色权限
      summary: 查询角色列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/RoleVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:role:list
    post:
      operationId: createRole
      tags:
      - 角色权限
      summary: 创建角色
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateDTO'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/RoleVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:role:list
  /roles/{id}:
    put:
      operationId: updateRole
      tags:
      - 角色权限
      summary: 更新角色
      parameters:
      - name: id
        in: path
        required: true
        description: 角色ID
        schema:
          type: string
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateDTO'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/RoleVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:role:list
  /roles/{id}/permissions:
    put:
      operationId: assignPermissions
      tags:
      - 角色权限
      summary: 分配权限
      parameters:
      - name: id
        in: path
        required: true
        description: 角色ID
        schema:
          type: string
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
              description: 权限代码列表
      responses:
        '200':
          description: 分配成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:role:list
  /permissions:
    get:
      operationId: getPermissionTree
      tags:
      - 角色权限
      summary: 查询权限树
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/PermissionTreeVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /organizations:
    get:
      operationId: getOrgTree
      tags:
      - 组织架构
      summary: 查询组织架构树
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/OrgTreeVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /organizations/sync:
    post:
      operationId: syncOrganizations
      tags:
      - 组织架构
      summary: 触发OA同步
      responses:
        '200':
          description: 同步完成
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/SyncResultVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /dicts:
    get:
      operationId: getDictTypeList
      tags:
      - 字典管理
      summary: 查询字典类型列表
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - $ref: '#/components/parameters/SortParam'
      - name: keyword
        in: query
        description: 搜索关键词
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PageDictTypeVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:dict:list
    post:
      operationId: createDictType
      tags:
      - 字典管理
      summary: 创建字典类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictTypeDTO'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DictTypeVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:dict:list
  /dicts/{code}/entries:
    get:
      operationId: getDictEntries
      tags:
      - 字典管理
      summary: 查询字典项
      parameters:
      - name: code
        in: path
        required: true
        description: 字典类型编码
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/DictEntryVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:dict:list
    post:
      operationId: createDictEntry
      tags:
      - 字典管理
      summary: 创建字典项
      parameters:
      - name: code
        in: path
        required: true
        description: 字典类型编码
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictEntryDTO'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DictEntryVO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:dict:list
  /configs:
    get:
      operationId: getConfigList
      tags:
      - 系统配置
      summary: 查询系统配置列表
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - $ref: '#/components/parameters/SortParam'
      - name: keyword
        in: query
        description: 搜索关键词
        schema:
          type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/PageConfigVO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:config:list
  /configs/{key}:
    put:
      operationId: updateConfig
      tags:
      - 系统配置
      summary: 更新配置
      parameters:
      - name: key
        in: path
        required: true
        description: 配置键
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigDTO'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-required-permission: sys:config:list
  /requirements:
    operationId: getRequirementList
    tags:
    - 需求管理
    summary: 查询需求列表
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RequirementCreateDTO'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PageRequirementVO'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/InternalServerError'
    parameters:
    - $ref: '#/components/parameters/PageParam'
    - $ref: '#/components/parameters/SizeParam'
    - $ref: '#/components/parameters/SortParam'
    - name: projectId
      in: query
      description: 项目ID
      schema:
        type: string
    - name: type
      in: query
      description: 需求类型
      schema:
        $ref: '#/components/schemas/ReqType'
    - name: status
      in: query
      description: 需求状态
      schema:
        $ref: '#/components/schemas/ReqStatus'
    - name: priority
      in: query
      description: 优先级
      schema:
        $ref: '#/components/schemas/ReqPriority'
    - name: keyword
      in: query
      description: 搜索关键词（编号/标题）
      schema:
        type: string
    - name: parentId
      in: query
      description: 父需求ID
      schema:
        type: string
  /requirements/import:
    post:
      operationId: importRequirements
      tags:
      - 需求管理
      summary: 批量导入需求
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel/CSV文件
                projectId:
                  type: string
                  description: 目标项目ID
      responses:
        '200':
          description: 导入完成
          content:
            application/json:
