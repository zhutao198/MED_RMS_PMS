<!--
原型版本：v1.5 | 编制日期：2026-05-25 | 基线：概要设计 v1.2 + 系统架构 v1.1
对应路由：/system/profile（当前用户档案编辑）
对应控制器：UserController.updateProfile
优先级：COULD
描述：用户档案编辑页 — 个人信息编辑、密码修改、偏好设置
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的档案 - Med-RMS</title>
  <style>
    :root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius:8px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Microsoft YaHei",Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
    .layout{display:flex;height:100vh}
    .sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
    .sidebar h1{font-size:16px;font-weight:700;color:var(--primary);padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:10px}
    .sidebar nav a{display:block;padding:10px 20px;color:var(--text-secondary);text-decoration:none;font-size:13px}
    .sidebar nav a:hover,.sidebar nav a.active{background:#eff6ff;color:var(--primary)}
    .main{flex:1;overflow:auto;padding:24px 32px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .header h2{font-size:20px;font-weight:600}
    .breadcrumb{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:500}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .card-header h3{font-size:14px;font-weight:600}
    .profile-header{display:flex;gap:20px;align-items:center;padding:24px 20px;border-bottom:1px solid var(--border)}
    .avatar-lg{width:72px;height:72px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
    .profile-info h2{font-size:18px;font-weight:700}
    .profile-info p{font-size:13px;color:var(--text-secondary)}
    .profile-info .role-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;background:#dbeafe;color:#1e40af;margin-top:4px}
    .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;gap:4px}
    .tab{padding:12px 16px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .tab-content{padding:20px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-hint{font-size:11px;color:var(--text-secondary);margin-top:4px}
    .pref-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
    .pref-label{font-size:13px;font-weight:500}
    .pref-desc{font-size:12px;color:var(--text-secondary)}
    .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background .2s}
    .toggle.on{background:var(--primary)}
    .toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .toggle.on::after{left:22px}
    .alert-box{padding:12px 16px;border-radius:var(--radius);font-size:13px;background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;margin-bottom:16px}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>Med-RMS</h1>
    <nav>
      <a href="#">仪表盘</a>
      <a href="#">需求管理</a>
      <a href="#">追溯管理</a>
      <a href="#">变更管理</a>
      <a href="#">合规管理</a>
      <a href="#">风险管理</a>
      <a href="#">项目管理</a>
      <a href="#">报表中心</a>
      <a href="#" class="active">系统管理</a>
    </nav>
  </aside>
  <main class="main">
    <div class="header">
      <div>
        <div class="breadcrumb">系统管理</div>
        <h2>我的档案</h2>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">保存修改</button>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="profile-header">
        <div class="avatar-lg">张</div>
        <div class="profile-info">
          <h2>张明远</h2>
          <p>zhang.my@zhongqimed.com</p>
          <div>
            <span class="role-tag">需求工程师</span>
            <span class="role-tag" style="background:#f1f5f9;color:#475569">研发部</span>
          </div>
        </div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab(this,'basic')">基本信息</div>
        <div class="tab" onclick="switchTab(this,'security')">安全设置</div>
        <div class="tab" onclick="switchTab(this,'pref')">偏好设置</div>
      </div>

      <!-- 基本信息 -->
      <div class="tab-content" id="basic">
        <div class="form-row">
          <div class="form-group">
            <label>真实姓名</label>
            <input type="text" value="张明远">
          </div>
          <div class="form-group">
            <label>用户名</label>
            <input type="text" value="zhang.my" readonly style="background:var(--bg)">
            <div class="form-hint">用户名不可修改</div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" value="zhang.my@zhongqimed.com">
          </div>
          <div class="form-group">
            <label>手机号</label>
            <input type="tel" value="13812345678">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>部门</label>
            <input type="text" value="研发部" readonly style="background:var(--bg)">
          </div>
          <div class="form-group">
            <label>岗位</label>
            <input type="text" value="高级需求工程师">
          </div>
        </div>
      </div>

      <!-- 安全设置 -->
      <div class="tab-content" id="security" style="display:none">
        <div class="alert-box">登录密码用于账号登录，电子签名密码用于 21 CFR Part 11 要求的电子签名，两种密码独立</div>
        <div class="form-group">
          <label>当前登录密码 *</label>
          <input type="password" placeholder="输入当前登录密码">
        </div>
        <div class="form-group">
          <label>新登录密码</label>
          <input type="password" placeholder="留空表示不修改">
          <div class="form-hint">至少8位，包含字母和数字</div>
        </div>
        <div class="form-group">
          <label>确认新密码</label>
          <input type="password" placeholder="再次输入新密码">
        </div>
      </div>

      <!-- 偏好设置 -->
      <div class="tab-content" id="pref" style="display:none">
        <div class="pref-item">
          <div>
            <div class="pref-label">邮件通知</div>
            <div class="pref-desc">需求变更、审批结果等通过邮件推送</div>
          </div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="pref-item">
          <div>
            <div class="pref-label">站内消息通知</div>
            <div class="pref-desc">系统内即时消息提醒</div>
          </div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="pref-item">
          <div>
            <div class="pref-label">审批待办提醒</div>
            <div class="pref-desc">有新的待审批事项时发送提醒</div>
          </div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="pref-item">
          <div>
            <div class="pref-label">逾期风险提醒</div>
            <div class="pref-desc">风险项 RPN 超标时发送告警</div>
          </div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="form-group" style="margin-top:16px">
          <label>语言 / Language</label>
          <select>
            <option>简体中文</option>
            <option>English</option>
          </select>
        </div>
        <div class="form-group">
          <label>时区</label>
          <select>
            <option>Asia/Shanghai (UTC+8)</option>
            <option>America/New_York (UTC-5)</option>
          </select>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
function switchTab(tab,id){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');document.getElementById(id).style.display='block'}
function saveProfile(){alert('档案已保存')}
</script>


<script>
// Navigation interceptor: runs only inside iframe, intercepts data-nav clicks
(function(){
  if (window === window.parent) return; // not in iframe, skip
  var src = document.location.pathname.split('/').pop() || '';
  if (!src) src = document.location.href.split('\').pop().split('?')[0];
  if (src) window.parent.postMessage({type:'proto-loaded', file: src}, '*');

  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'navigate' && e.data.file) {
      document.location.href = e.data.file;
    }
  });

  document.addEventListener('click', function(e){
    var btn = e.target.closest('.el-button');
    if (!btn) return;
    var target = btn.getAttribute('data-nav');
    if (!target) {
      var parent = btn.closest('[data-nav]');
      if (parent) target = parent.getAttribute('data-nav');
    }
    if (target) {
      e.preventDefault();
      e.stopPropagation();
      window.parent.postMessage({type:'navigate', file: target}, '*');
    }
  });
})();
</script>

</body>
</html>
