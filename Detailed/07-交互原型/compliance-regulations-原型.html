<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    原型版本：v1.1 | 编制日期：2026-05-23 | 基线：概要设计 v1.2 + 系统架构 v1.1
    评审反馈：COULD 级缺失，法规映射页缺少界面原型
    -->
    <title>Med-RMS 法规映射 - 交互原型</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.9.1/dist/index.css">
    <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus@2.9.1/dist/index.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #f0f2f5; }
        .app-header { height: 60px; background: #1a1a2e; color: #fff; display: flex; align-items: center; padding: 0 24px; }
        .app-header h1 { font-size: 18px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .main-layout { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e4e7ed; overflow-y: auto; flex-shrink: 0; }
        .sidebar .menu-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #606266; }
        .sidebar .menu-item.active { background: #ecf5ff; color: #409eff; border-left: 3px solid #409eff; }
        .sidebar .menu-group { padding: 8px 20px 4px; font-size: 12px; color: #909399; font-weight: 600; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 20px; font-weight: 600; color: #303133; }
        .filter-bar { background: #fff; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .table-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
        .mapping-table { width: 100%; border-collapse: collapse; }
        .mapping-table th { background: #f5f7fa; padding: 14px 12px; text-align: left; color: #606266; font-weight: 600; font-size: 13px; border-bottom: 2px solid #e4e7ed; }
        .mapping-table td { padding: 14px 12px; border-bottom: 1px solid #ebeef5; font-size: 13px; vertical-align: top; }
        .reg-badge { display: inline-flex; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin: 2px; }
        .reg-badge.nmpa { background: #fef0f0; color: #f56c6c; }
        .reg-badge.fda { background: #ecf5ff; color: #409eff; }
        .reg-badge.ce { background: #f0f9eb; color: #67c23a; }
        .reg-badge.iec { background: #fdf6ec; color: #e6a23c; }
        .req-link { color: #409eff; cursor: pointer; font-size: 12px; margin-right: 8px; }
        .req-link:hover { text-decoration: underline; }
        .action-link { color: #409eff; cursor: pointer; font-size: 12px; }
        .action-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-header">
        <h1>🏥 Med-RMS 医疗器械需求管理系统</h1>
        <div class="header-right">
            <el-tag type="success" size="small">心电监护仪 v3.0</el-tag>
            <span style="font-size:13px;">张工（质量工程师）</span>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar">
            <div class="menu-group">合规管理</div>
            <div class="menu-item">📋 基线管理</div>
            <div class="menu-item">🔍 审计日志</div>
            <div class="menu-item">📦 SOUP 管理</div>
            <div class="menu-item>🏷️ 安全分类</div>
            <div class="menu-item active">📜 法规映射</div>
            <div class="menu-group">报表</div>
            <div class="menu-item">📊 合规报告</div>
        </div>
        <div class="content-area">
            <div class="breadcrumb" style="font-size: 13px; color: #909399; margin-bottom: 16px;">
                合规管理 / <span style="color:#606266;">法规映射</span>
            </div>
            <div class="page-header">
                <div class="page-title">📜 法规条款映射</div>
                <div class="header-actions">
                    <el-button type="primary">+ 添加映射规则</el-button>
                    <el-button data-nav="report-export-原型.html">📤 导出映射表</el-button>
                </div>
            </div>
            <div class="filter-bar">
                <el-select v-model="regulationFilter" style="width: 130px;" placeholder="法规">
                    <el-option label="全部法规" value="" />
                    <el-option label="NMPA" value="nmpa" />
                    <el-option label="FDA" value="fda" />
                    <el-option label="CE" value="ce" />
                    <el-option label="IEC 62304" value="iec" />
                </el-select>
                <el-select v-model="levelFilter" style="width: 130px;" placeholder="需求层级">
                    <el-option label="全部层级" value="" />
                    <el-option label="URS" value="URS" />
                    <el-option label="PRS" value="PRS" />
                    <el-option label="SRS" value="SRS" />
                    <el-option label="DRS" value="DRS" />
                </el-select>
                <el-input v-model="searchKeyword" placeholder="搜索条款/需求" style="width: 200px;" clearable />
            </div>
            <div class="table-card">
                <table class="mapping-table">
                    <thead>
                        <tr>
                            <th style="width: 100px;">法规</th>
                            <th style="width: 120px;">条款编号</th>
                            <th>条款描述</th>
                            <th style="width: 150px;">关联需求</th>
                            <th style="width: 80px;">映射数量</th>
                            <th style="width: 100px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="item in filteredMappings" :key="item.id">
                            <td>
                                <span class="reg-badge" :class="item.regType">{{ item.regType.toUpperCase() }}</span>
                            </td>
                            <td style="font-weight: 600;">{{ item.clause }}</td>
                            <td>{{ item.description }}</td>
                            <td>
                                <span class="req-link" v-for="req in item.linkedReqs" :key="req">{{ req }}</span>
                            </td>
                            <td style="text-align: center; font-weight: 600;">{{ item.count }}</td>
                            <td>
                                <span class="action-link">详情</span>
                                <span class="action-link" style="margin-left: 8px;">编辑</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
const { createApp, ref, computed } = Vue;
const app = createApp({
    setup() {
        const regulationFilter = ref('');
        const levelFilter = ref('');
        const searchKeyword = ref('');
        const mappings = ref([
            { id: 1, regType: 'nmpa', clause: 'YY 0505', description: '医用电气设备电磁兼容要求', linkedReqs: ['URS-ECG3-0010', 'PRS-ECG3-0020'], count: 2 },
            { id: 2, regType: 'fda', clause: '21 CFR Part 820', description: '质量体系法规', linkedReqs: ['URS-ECG3-0001'], count: 1 },
            { id: 3, regType: 'ce', clause: 'EN 60601-1', description: '医用电气设备通用安全要求', linkedReqs: ['URS-ECG3-0002', 'PRS-ECG3-0015', 'SRS-ECG3-0042'], count: 3 },
            { id: 4, regType: 'iec', clause: 'IEC 62304', description: '医疗器械软件生命周期过程', linkedReqs: ['URS-ECG3-0003', 'PRS-ECG3-0016'], count: 2 }
        ]);
        const filteredMappings = computed(() => {
            return mappings.value.filter(m => {
                if (regulationFilter.value && m.regType !== regulationFilter.value) return false;
                return true;
            });
        });
        return { regulationFilter, levelFilter, searchKeyword, mappings, filteredMappings };
    }
});
app.use(ElementPlus);
app.mount('#app');
</script>


<script>
// Navigation interceptor: runs only inside iframe, intercepts data-nav clicks
(function(){
  if (window === window.parent) return; // not in iframe, skip
  var src = document.location.pathname.split('/').pop() || '';
  if (!src) src = document.location.href.split('\').pop().split('?')[0];
  if (src) window.parent.postMessage({type:'proto-loaded', file: src}, '*');

  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'navigate' && e.data.file) {
      document.location.href = e.data.file;
    }
  });

  document.addEventListener('click', function(e){
    var btn = e.target.closest('.el-button');
    if (!btn) return;
    var target = btn.getAttribute('data-nav');
    if (!target) {
      var parent = btn.closest('[data-nav]');
      if (parent) target = parent.getAttribute('data-nav');
    }
    if (target) {
      e.preventDefault();
      e.stopPropagation();
      window.parent.postMessage({type:'navigate', file: target}, '*');
    }
  });
})();
</script>

</body>
</html>
