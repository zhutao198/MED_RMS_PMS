<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    原型版本：v1.1 | 编制日期：2026-05-23 | 基线：概要设计 v1.2 + 系统架构 v1.1
    评审反馈：COULD 级缺失，基线详情页缺少界面原型
    -->
    <title>Med-RMS 基线详情 - 交互原型</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.9.1/dist/index.css">
    <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus@2.9.1/dist/index.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #f0f2f5; }
        .app-header { height: 60px; background: #1a1a2e; color: #fff; display: flex; align-items: center; padding: 0 24px; }
        .app-header h1 { font-size: 18px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .main-layout { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e4e7ed; overflow-y: auto; flex-shrink: 0; }
        .sidebar .menu-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #606266; }
        .sidebar .menu-item.active { background: #ecf5ff; color: #409eff; border-left: 3px solid #409eff; }
        .sidebar .menu-group { padding: 8px 20px 4px; font-size: 12px; color: #909399; font-weight: 600; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .breadcrumb { font-size: 13px; color: #909399; margin-bottom: 16px; }
        .breadcrumb span { color: #409eff; cursor: pointer; }
        .detail-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 24px; margin-bottom: 20px; }
        .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .detail-title { font-size: 20px; font-weight: 600; color: #303133; }
        .status-badge { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .status-badge.locked { background: #1a1a2e; color: #fff; }
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .info-item { background: #f5f7fa; padding: 12px; border-radius: 6px; }
        .info-item .label { font-size: 12px; color: #909399; margin-bottom: 4px; }
        .info-item .value { font-size: 16px; font-weight: 600; color: #303133; }
        .req-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        .req-table th { background: #f5f7fa; padding: 12px; text-align: left; font-size: 13px; font-weight: 600; }
        .req-table td { padding: 12px; border-bottom: 1px solid #ebeef5; font-size: 13px; }
        .level-tag { padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .level-tag.URS { background: #ecf5ff; color: #409eff; }
        .level-tag.PRS { background: #f0f9eb; color: #67c23a; }
        .level-tag.SRS { background: #fdf6ec; color: #e6a23c; }
        .level-tag.DRS { background: #fef0f0; color: #f56c6c; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-header">
        <h1>🏥 Med-RMS 医疗器械需求管理系统</h1>
        <div class="header-right">
            <el-tag type="success" size="small">心电监护仪 v3.0</el-tag>
            <span style="font-size:13px;">张工（需求工程师）</span>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar">
            <div class="menu-group">合规管理</div>
            <div class="menu-item">📋 基线管理</div>
            <div class="menu-item active">🔒 基线详情</div>
        </div>
        <div class="content-area">
            <div class="breadcrumb">
                <span>合规管理</span> / <span>基线管理</span> / <span style="color:#606266;">BL-ECG3-2026-05-01</span>
            </div>
            <div class="detail-card">
                <div class="detail-header">
                    <div class="detail-title">🔒 BL-ECG3-2026-05-01</div>
                    <span class="status-badge locked">🔒 已锁定</span>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">锁定日期</div>
                        <div class="value">2026-05-01</div>
                    </div>
                    <div class="info-item">
                        <div class="label">锁定人</div>
                        <div class="value">李主任</div>
                    </div>
                    <div class="info-item">
                        <div class="label">需求数量</div>
                        <div class="value">248 条</div>
                    </div>
                    <div class="info-item">
                        <div class="label">关联变更</div>
                        <div class="value">3 个</div>
                    </div>
                </div>
                <el-divider />
                <div style="font-size: 14px; color: #606266; margin-bottom: 16px;">基线包含的需求列表：</div>
                <table class="req-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">需求编号</th>
                            <th style="width: 80px;">层级</th>
                            <th>需求标题</th>
                            <th style="width: 80px;">版本</th>
                            <th style="width: 100px;">创建人</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="req in baselineReqs" :key="req.code">
                            <td style="font-weight: 600; color: #409eff;">{{ req.code }}</td>
                            <td><span class="level-tag" :class="req.level">{{ req.level }}</span></td>
                            <td>{{ req.title }}</td>
                            <td>{{ req.version }}</td>
                            <td>{{ req.creator }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
const { createApp, ref } = Vue;
const app = createApp({
    setup() {
        const baselineReqs = ref([
            { code: 'URS-ECG3-0001', level: 'URS', title: '系统应具备心电信号采集功能', version: '1.0', creator: '张工' },
            { code: 'URS-ECG3-0002', level: 'URS', title: '系统应支持多种导联配置', version: '1.0', creator: '张工' },
            { code: 'PRS-ECG3-0015', level: 'PRS', title: '报警阈值配置与管理', version: '1.0', creator: '李工' }
        ]);
        return { baselineReqs };
    }
});
app.use(ElementPlus);
app.mount('#app');
</script>


<script>
// Navigation interceptor: runs only inside iframe, intercepts data-nav clicks
(function(){
  if (window === window.parent) return; // not in iframe, skip
  var src = document.location.pathname.split('/').pop() || '';
  if (!src) src = document.location.href.split('\').pop().split('?')[0];
  if (src) window.parent.postMessage({type:'proto-loaded', file: src}, '*');

  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'navigate' && e.data.file) {
      document.location.href = e.data.file;
    }
  });

  document.addEventListener('click', function(e){
    var btn = e.target.closest('.el-button');
    if (!btn) return;
    var target = btn.getAttribute('data-nav');
    if (!target) {
      var parent = btn.closest('[data-nav]');
      if (parent) target = parent.getAttribute('data-nav');
    }
    if (target) {
      e.preventDefault();
      e.stopPropagation();
      window.parent.postMessage({type:'navigate', file: target}, '*');
    }
  });
})();
</script>

</body>
</html>
