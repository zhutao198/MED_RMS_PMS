spring:
  application:
    name: med-rms
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/med_rms_pms?useUnicode=true&characterEncoding=utf-8
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  # v1.43 P1-6 修复：附件上传支持
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

med-rms:
  attachment:
    storage-path: ${java.io.tmpdir}/med-rms-attachments

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhutao.medrms.**.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.zhutao.medrms: DEBUG          # dev: DEBUG, prod: INFO（见 application-prod.yml）
    com.baomidou.mybatisplus: DEBUG  # dev: DEBUG, prod: WARN
  file:
    name: C:/temp/medrms-app.log

# W22 Actuator 可观测性
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, mappings, beans
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true