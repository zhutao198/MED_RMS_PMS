# Med-RMS CI Pipeline（GitHub Actions）
# 触发：push / pull_request / weekly
# 阶段：unit → integration → db-backup → k6-smoke

name: Med-RMS CI

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨 2 点跑

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: med_rms_pms
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: med_rms_pms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: DDL 准备
        run: |
          PGPASSWORD=$DB_PASSWORD psql -h localhost -U $DB_USER -d $DB_NAME \
              -f Code/backend/med-rms-web/src/main/resources/02-DDL/med_rms_ddl.sql || true

      - name: 单元测试
        run: cd Code/backend && mvn test -B

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: Code/backend/**/target/surefire-reports/

  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: med_rms_pms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: DDL
        run: PGPASSWORD=$DB_PASSWORD psql -h localhost -U $DB_USER -d $DB_NAME -f Code/backend/med-rms-web/src/main/resources/02-DDL/med_rms_ddl.sql
      - name: 集成测试
        run: cd Code/backend && mvn -pl med-rms-web test -B

  db-backup:
    name: DB 备份
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - name: 安装 PG 客户端
        run: sudo apt install -y postgresql-client
      - name: 启动 PG 服务
        run: |
          sudo service postgresql start
          sleep 5
      - name: 跑备份
        run: bash Code/backend/ops/backup.sh
      - name: 上传备份
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: '*.dump'
        if: always()

  k6-smoke:
    name: k6 性能冒烟
    runs-on: ubuntu-latest
    needs: integration-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: med_rms_pms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: 启动后端
        run: |
          cd Code/backend
          PGPASSWORD=$DB_PASSWORD psql -h localhost -U $DB_USER -d $DB_NAME \
              -f med-rms-web/src/main/resources/02-DDL/med_rms_ddl.sql
          nohup mvn spring-boot:run -pl med-rms-web -Dspring-boot.run.profiles=test > /tmp/backend.log 2>&1 &
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            sleep 2
            if curl -s -f http://localhost:8080/api/health > /dev/null; then
              echo "Backend up after ${i}s"
              break
            fi
          done
      - name: 跑 k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: Code/backend/tools/perf/w17_smoke.js
          flags: --duration 30s --vus 30

  summary:
    name: 总结
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, db-backup, k6-smoke]
    if: always()
    steps:
      - name: 总结
        run: |
          echo "===== Med-RMS CI Summary ====="
          echo "✅ Unit test: ${{ needs.unit-test.result }}"
          echo "✅ Integration: ${{ needs.integration-test.result }}"
          echo "✅ DB backup: ${{ needs.db-backup.result }}"
          echo "✅ k6 smoke: ${{ needs.k6-smoke.result }}"

  notify-failure:
    name: 失败通知
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, db-backup, k6-smoke]
    if: failure()
    steps:
      - name: 通知
        run: |
          echo "❌ Med-RMS CI 失败"
          echo "请查看 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # 可加 Slack/飞书 webhook：
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" -d '{"text":"Med-RMS CI failed"}'
